# /etc/nginx/bx/conf/bitrix-nuxt.conf
include bx/conf/bitrix_general_nuxt.conf;

# /bitrix и /local
location ~* ^/(bitrix|local)/.+\.(css(\.map)?|js(\.map)?|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv|svgz?|ttf|ttc|otf|eot|woff2?)$ {
    try_files  $uri =404;
    expires    30d;
    access_log off;
    add_header Cache-Control          "public, immutable";
    add_header X-Content-Type-Options "nosniff";
}

# PHP внутри /bitrix и /local
location ~ ^/(bitrix|local)/.*\.php$ {
    proxy_pass         $proxyserver;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location /bitrix {
    proxy_pass       $proxyserver;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
}

location /local {
    proxy_pass       $proxyserver;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
}

# Nuxt-ассеты
location ~* \.(css(\.map)?|js(\.map)?|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv)$ {
    try_files $uri @nuxt_static;
    expires    30d;
    access_log off;
    add_header Cache-Control          "public, immutable";
    add_header X-Content-Type-Options "nosniff";
}

location ~* \.(svgz?|ttf|ttc|otf|eot|woff2?)$ {
    try_files $uri @nuxt_static;
    expires    30d;
    access_log off;
    add_header Cache-Control              "public, immutable";
    add_header X-Content-Type-Options     "nosniff";
    add_header Access-Control-Allow-Origin "*";
}

location @nuxt_static {
    proxy_pass         $proxynuxtserver;
    proxy_http_version 1.1;
}

location / {
    proxy_pass         $proxynuxtserver;
    proxy_http_version 1.1;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    proxy_next_upstream error timeout http_502 http_503;
}