services:
    nginx:
        build:
            context: ${DOCKER_PATH}
            dockerfile: ${DOCKER_PATH}/nginx/Dockerfile
            args:
                USERGROUP: ${USERGROUP}
        volumes:
            - ${SITE_PATH}:/var/www
            - ${CONF_PATH}/nginx/conf.d:/etc/nginx/conf.d
            - ${CONF_PATH}/nginx/nginx.conf:/etc/nginx/nginx.conf
        ports:
            - 80:80
            - 443:443
        depends_on:
            - app
        networks:
            - docky
        container_name: nginx
    app:
        build:
            context: ${DOCKER_PATH}
            dockerfile: ${DOCKER_PATH}/app/php-${PHP_VERSION}/Dockerfile
            args:
                USERGROUP: ${USERGROUP}
        volumes:
            - ${SITE_PATH}:/var/www
        ports:
            - 9000:9000
            - 6001:6001
        environment:
            PHP_IDE_CONFIG: serverName=xdebugServer
            XDEBUG_TRIGGER: testTrig
        depends_on:
            - mysql
        networks:
            - docky
        extra_hosts:
            - host.docker.internal:host-gateway
        container_name: app
    mysql:
        image: mysql:${MYSQL_VERSION}
        restart: always
        volumes:
            - mysql_data:/var/lib/mysql
            - ${DOCKER_PATH}/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
        ports:
            - 8102:3306
        environment:
            MYSQL_DATABASE: site
            MYSQL_ROOT_PASSWORD: root
        networks:
            - docky
        container_name: mysql
    mailhog:
        image: mailhog/mailhog
        ports:
            - 1025:1025
            - 8025:8025
        networks:
            - docky
        container_name: mailhog
    node:
        build:
            context: ${DOCKER_PATH}
            dockerfile: ${DOCKER_PATH}/node/Dockerfile
            args:
                NODE_VERSION: ${NODE_VERSION}
                USERGROUP: ${USERGROUP}
        volumes:
            - ${SITE_PATH}:/var/www
        ports:
            - 5173:5173
            - 5174:5174
        depends_on:
            - app
        networks:
            - docky
        command: sh -c "su -s /bin/sh docky -c 'pm2 start /var/www/nuxt/ecosystem.config.cjs --name node-server' && tail -f /dev/null"
        working_dir: ${NODE_PATH}
        container_name: node
volumes:
    mysql_data: {}
networks:
    docky:
        driver: bridge
