location ~* ^/(bitrix|local|upload)/.+\.(css(\.map)?|js(\.map)?|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv|svgz?|ttf|ttc|otf|eot|woff2?)$ {
    try_files  $uri =404;
    expires    7d;
    access_log off;
    add_header Cache-Control          "public";
    add_header X-Content-Type-Options "nosniff";
}

location ~ ^/(bitrix|local)/.*\.php$ {
    try_files $uri @bitrix;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass   app:9000;
    fastcgi_index  index.php;
    include        fastcgi_params;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
    fastcgi_param  PATH_INFO        $fastcgi_path_info;
    fastcgi_param  SERVER_NAME      $effective_host;
    fastcgi_param  HTTP_HOST        $effective_host;
    fastcgi_param  SERVER_PORT      $server_port;
    fastcgi_param  SERVER_PROTOCOL  $server_protocol;
    fastcgi_read_timeout    300s;
    fastcgi_connect_timeout 300s;
    fastcgi_send_timeout    300s;
}

location /bitrix {
    try_files $uri $uri/ @bitrix;
}

location /local {
    try_files $uri $uri/ @bitrix;
}

location @bitrix {
    fastcgi_pass  app:9000;
    include       fastcgi_params;
    fastcgi_param SERVER_NAME      $effective_host;
    fastcgi_param HTTP_HOST        $effective_host;
    fastcgi_param SERVER_PORT      $server_port;
    fastcgi_param SCRIPT_FILENAME  /var/www/bitrix/urlrewrite.php;
    fastcgi_read_timeout    300s;
    fastcgi_connect_timeout 300s;
    fastcgi_send_timeout    300s;
}

location ~* \.(css(\.map)?|js(\.map)?|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv)$ {
    try_files $uri @nuxt_static;
    expires    7d;
    access_log off;
    add_header Cache-Control        "public";
    add_header X-Content-Type-Options "nosniff";
}

location ~* \.(svgz?|ttf|ttc|otf|eot|woff2?)$ {
    try_files $uri @nuxt_static;
    expires    7d;
    access_log off;
    add_header Cache-Control             "public";
    add_header X-Content-Type-Options    "nosniff";
    add_header Access-Control-Allow-Origin "*";
}

location @nuxt_static {
    proxy_pass         "http://node:5174";
    proxy_http_version 1.1;
}

location / {
    proxy_pass             "http://node:5174";
    proxy_http_version     1.1;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    proxy_buffering    on;
    proxy_buffer_size  8k;
    proxy_buffers      16 8k;

    proxy_next_upstream error timeout http_502 http_503;
}